<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>✨ Prep for Finals · Неоновая подготовка ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at 30% 30%, #010005, #000000);
            font-family: 'Segoe UI', 'Inter', 'Poppins', system-ui, sans-serif;
            min-height: 100vh;
            padding: 2rem 1.5rem;
            position: relative;
            overflow-x: hidden;
            color: #ffffff;
        }

        /* ✨ ЗВЁЗДЫ (мерцающие) */
        .star {
            position: fixed;
            background: #ffffff;
            border-radius: 50%;
            opacity: 0;
            animation: starTwinkle 5s infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes starTwinkle {
            0% { opacity: 0.1; transform: scale(0.6); box-shadow: 0 0 1px #fff; }
            100% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 12px #ffec9e, 0 0 8px #ffb347; }
        }

        /* ПЛАНЕТЫ И РАКЕТА */
        .planet {
            position: fixed;
            font-size: 3.5rem;
            pointer-events: none;
            z-index: 0;
            filter: drop-shadow(0 0 15px cyan);
            animation: floatPlanet 18s infinite alternate ease-in-out;
        }

        .earth { top: 12%; left: -2%; font-size: 4rem; animation-duration: 22s; }
        .moon { bottom: 5%; right: -1%; font-size: 3rem; animation-duration: 16s; filter: drop-shadow(0 0 20px #ff69b4); }
        .mars { top: 70%; left: 85%; font-size: 3.8rem; animation-duration: 25s; filter: drop-shadow(0 0 15px #ff4500); }

        @keyframes floatPlanet {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(30px, -20px) rotate(8deg); }
        }

        .rocket {
            position: fixed;
            bottom: 3%;
            left: 0%;
            font-size: 3rem;
            pointer-events: none;
            animation: flyRocket 16s infinite linear;
            z-index: 0;
            filter: drop-shadow(0 0 12px #ffaa00);
        }

        @keyframes flyRocket {
            0% { transform: translateX(-100px) translateY(0) rotate(-5deg); }
            100% { transform: translateX(110vw) translateY(-200px) rotate(10deg); }
        }

        /* ОСНОВНОЙ КОНТЕЙНЕР */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        /* ЗАГОЛОВОК С НЕОНОВЫМ СВЕЧЕНИЕМ */
        h1 {
            font-size: 3.2rem;
            text-align: center;
            background: linear-gradient(135deg, #ff44cc, #44ffaa, #ffaa44);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 25px rgba(255, 68, 204, 0.6);
            letter-spacing: 2px;
            animation: glowPulse 3s infinite alternate;
        }

        @keyframes glowPulse {
            0% { text-shadow: 0 0 10px #ff44cc, 0 0 20px #ffaa44; }
            100% { text-shadow: 0 0 30px #44ffaa, 0 0 40px #ff44cc; }
        }

        .sub {
            text-align: center;
            color: #ccddff;
            font-size: 1.2rem;
            margin-bottom: 2.5rem;
            text-shadow: 0 0 8px #44aaff;
        }

        /* СЕТКА ПРЕДМЕТОВ */
        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        /* КАРТОЧКА ПРЕДМЕТА (НЕОНОВЫЙ СТЕКЛОМОРФИЗМ) */
        .subject-card {
            background: rgba(10, 5, 25, 0.55);
            backdrop-filter: blur(14px);
            border-radius: 2.5rem;
            padding: 2rem;
            border: 2px solid rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.3), inset 0 0 20px rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            text-align: center;
        }

        .subject-card:hover {
            transform: translateY(-12px);
            border-color: #ff44cc;
            box-shadow: 0 0 45px rgba(255, 68, 204, 0.5);
            background: rgba(20, 10, 40, 0.7);
        }

        .subject-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(145deg, #ff66cc, #66ffcc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px #ff66cc;
        }

        .btn-start {
            background: linear-gradient(95deg, #ff44aa, #aa44ff);
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 3rem;
            font-weight: bold;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            display: inline-block;
            margin-top: 1rem;
            transition: 0.2s;
            box-shadow: 0 0 20px #ff44aa;
            text-decoration: none;
        }

        .btn-start:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px #ff66ff;
            background: linear-gradient(95deg, #ff66cc, #cc66ff);
        }

        .disabled-btn {
            opacity: 0.4;
            filter: grayscale(0.3);
            cursor: default;
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            color: #aaccff;
            text-shadow: 0 0 8px #2266aa;
        }

        @media (max-width: 700px) {
            h1 { font-size: 2rem; }
            .subject-title { font-size: 1.6rem; }
            .planet { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <!-- ПЛАНЕТЫ И РАКЕТА -->
    <div class="planet earth">🌍</div>
    <div class="planet moon">🌙</div>
    <div class="planet mars">🪐</div>
    <div class="rocket">🚀</div>

    <!-- ГЕНЕРАЦИЯ ЗВЁЗД (случайные) -->
    <script>
        for (let i = 0; i < 180; i++) {
            let star = document.createElement('div');
            star.classList.add('star');
            let size = Math.random() * 3 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 8 + 's';
            star.style.animationDuration = 3 + Math.random() * 5 + 's';
            document.body.appendChild(star);
        }
    </script>

    <div class="container">
        <h1>✨ PREP FOR FINALS ✨</h1>
        <div class="sub">🌙 неоновая подготовка к экзаменам</div>

        <div class="subjects-grid">
            <!-- РЕЛИГИОВЕДЕНИЕ -->
            <div class="subject-card">
                <div class="subject-title">📖 Религиоведение</div>
                <div>блоки 1–50, 51–100 и далее</div>
                <a href="relig_1_50.html" class="btn-start">🚀 Блок 1-50</a>
                <div style="margin-top: 0.8rem; font-size: 0.8rem; color: #bbddff;">скоро больше блоков</div>
            </div>

            <!-- ГОСПИТАЛЬНАЯ ПЕДАГОГИКА -->
            <div class="subject-card">
                <div class="subject-title">🏥 Госпитальная педагогика</div>
                <div>готовится</div>
                <button class="btn-start disabled-btn" disabled>🚧 Скоро</button>
            </div>

            <!-- НЕМЕЦКИЙ -->
            <div class="subject-card">
                <div class="subject-title">🇩🇪 Немецкий</div>
                <div>готовится</div>
                <button class="btn-start disabled-btn" disabled>🚧 Скоро</button>
            </div>

            <!-- ФРАНЦУЗСКИЙ -->
            <div class="subject-card">
                <div class="subject-title">🇫🇷 Французский</div>
                <div>готовится</div>
                <button class="btn-start disabled-btn" disabled>🚧 Скоро</button>
            </div>
        </div>
        <footer>⚡︎ учись ярко, сдавай на отлично ⚡︎</footer>
    </div>
</body>
</html>
