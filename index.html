<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Prep for Finals · Религиоведение и другие</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 20% 30%, #0a0a1a, #010105);
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            padding: 2rem 1.5rem;
            color: #edeff7;
        }
        .container { max-width: 1300px; margin: 0 auto; }
        h1 {
            font-size: 2.8rem;
            background: linear-gradient(135deg, #e0b0ff, #a070ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .sub {
            text-align: center;
            color: #b9b3e6;
            margin-bottom: 2.5rem;
        }
        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }
        .subject-card {
            background: rgba(20, 15, 45, 0.55);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 2rem;
            border: 1px solid rgba(180, 130, 255, 0.5);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            text-align: center;
        }
        .subject-card:hover {
            transform: translateY(-8px);
            background: rgba(30, 22, 60, 0.7);
            box-shadow: 0 0 20px rgba(160, 120, 255, 0.4);
        }
        .subject-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(145deg, #d0b0ff, #8a5acf);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .btn-start {
            background: linear-gradient(95deg, #6a3caf, #8a5acf);
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 3rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-top: 1rem;
            transition: 0.2s;
        }
        .btn-start:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px #b77eff;
        }
        footer {
            text-align: center;
            margin-top: 3rem;
            color: #7f78b0;
        }
        @media (max-width: 700px) {
            h1 { font-size: 2rem; }
            .subject-title { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>✨ Prep for Finals ✨</h1>
    <div class="sub">выбери предмет для подготовки</div>

    <div class="subjects-grid">
        <!-- Религиоведение -->
        <div class="subject-card">
            <div class="subject-title">📖 Религиоведение</div>
            <div>блоки вопросов 1–50, 51–100 и т.д.</div>
            <a href="relig_1_50.html" class="btn-start">🚀 Начать блок 1‑50</a>
            <div style="margin-top: 0.8rem; font-size: 0.8rem;">(остальные блоки появятся позже)</div>
        </div>
        <!-- Госпитальная педагогика -->
        <div class="subject-card">
            <div class="subject-title">🏥 Госпитальная педагогика</div>
            <div>будет добавлено</div>
            <button class="btn-start" disabled style="opacity:0.5;">🚧 Скоро</button>
        </div>
        <!-- Немецкий -->
        <div class="subject-card">
            <div class="subject-title">🇩🇪 Немецкий</div>
            <div>будет добавлено</div>
            <button class="btn-start" disabled style="opacity:0.5;">🚧 Скоро</button>
        </div>
        <!-- Французский -->
        <div class="subject-card">
            <div class="subject-title">🇫🇷 Французский</div>
            <div>будет добавлено</div>
            <button class="btn-start" disabled style="opacity:0.5;">🚧 Скоро</button>
        </div>
    </div>
    <footer>🌙 темная магия знаний · удачи на экзаменах!</footer>
</div>
</body>
</html>
