<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>✨ Prep for Finals · Неоновая подготовка ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at 30% 30%, #010005, #000000);
            font-family: 'Segoe UI', 'Inter', 'Poppins', system-ui, sans-serif;
            min-height: 100vh;
            padding: 1.5rem 1rem;
            position: relative;
            overflow-x: hidden;
            color: #ffffff;
        }

        /* ✨ ЗВЁЗДЫ (мерцающие) */
        .star {
            position: fixed;
            background: #ffffff;
            border-radius: 50%;
            opacity: 0;
            animation: starTwinkle 5s infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes starTwinkle {
            0% { opacity: 0.1; transform: scale(0.6); box-shadow: 0 0 1px #fff; }
            100% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 12px #ffec9e, 0 0 8px #ffb347; }
        }

        /* ПЛАНЕТЫ И РАКЕТА */
        .planet {
            position: fixed;
            font-size: clamp(2rem, 8vw, 4rem);
            pointer-events: none;
            z-index: 0;
            filter: drop-shadow(0 0 15px cyan);
            animation: floatPlanet 18s infinite alternate ease-in-out;
        }

        .earth { top: 12%; left: -2%; animation-duration: 22s; }
        .moon { bottom: 5%; right: -1%; filter: drop-shadow(0 0 20px #ff69b4); animation-duration: 16s; }
        .mars { top: 70%; left: 85%; filter: drop-shadow(0 0 15px #ff4500); animation-duration: 25s; }

        @keyframes floatPlanet {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(20px, -15px) rotate(5deg); }
        }

        .rocket {
            position: fixed;
            bottom: 0%;
            left: -5%;
            font-size: clamp(2rem, 6vw, 3rem);
            pointer-events: none;
            animation: flyRocket 16s infinite linear;
            z-index: 0;
            filter: drop-shadow(0 0 12px #ffaa00);
        }

        @keyframes flyRocket {
            0% { transform: translateX(-80px) translateY(0) rotate(-3deg); }
            100% { transform: translateX(110vw) translateY(-150px) rotate(8deg); }
        }

        /* ОСНОВНОЙ КОНТЕЙНЕР */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
            width: 100%;
        }

        /* ЗАГОЛОВОК С НЕОНОВЫМ СВЕЧЕНИЕМ */
        h1 {
            font-size: clamp(1.8rem, 6vw, 3.2rem);
            text-align: center;
            background: linear-gradient(135deg, #ff44cc, #44ffaa, #ffaa44);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 25px rgba(255, 68, 204, 0.6);
            letter-spacing: 1px;
            animation: glowPulse 3s infinite alternate;
            word-break: break-word;
        }

        @keyframes glowPulse {
            0% { text-shadow: 0 0 10px #ff44cc, 0 0 20px #ffaa44; }
            100% { text-shadow: 0 0 30px #44ffaa, 0 0 40px #ff44cc; }
        }

        .sub {
            text-align: center;
            color: #ccddff;
            font-size: clamp(0.9rem, 4vw, 1.2rem);
            margin-bottom: 2rem;
            text-shadow: 0 0 8px #44aaff;
            word-break: break-word;
        }

        /* СЕТКА ПРЕДМЕТОВ */
        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        /* КАРТОЧКА ПРЕДМЕТА (НЕОНОВЫЙ СТЕКЛОМОРФИЗМ) */
        .subject-card {
            background: rgba(10, 5, 25, 0.55);
            backdrop-filter: blur(14px);
            border-radius: 2rem;
            padding: 1.5rem 1rem;
            border: 2px solid rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.3), inset 0 0 20px rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            text-align: center;
            word-break: break-word;
        }

        .subject-card:hover {
            transform: translateY(-8px);
            border-color: #ff44cc;
            box-shadow: 0 0 35px rgba(255, 68, 204, 0.5);
        }

        .subject-title {
            font-size: clamp(1.4rem, 5vw, 2rem);
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(145deg, #ff66cc, #66ffcc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px #ff66cc;
            line-height: 1.3;
            word-break: break-word;
        }

        .subject-card div {
            font-size: clamp(0.8rem, 3.5vw, 0.95rem);
            color: #ccddff;
            margin-bottom: 0.5rem;
            word-break: break-word;
        }

        .btn-start {
            background: linear-gradient(95deg, #ff44aa, #aa44ff);
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 3rem;
            font-weight: bold;
            font-size: clamp(0.85rem, 4vw, 1rem);
            color: white;
            cursor: pointer;
            display: inline-block;
            margin-top: 0.8rem;
            transition: 0.2s;
            box-shadow: 0 0 15px #ff44aa;
            text-decoration: none;
        }

        .btn-start:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px #ff66ff;
        }

        .disabled-btn {
            opacity: 0.4;
            filter: grayscale(0.3);
            cursor: default;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            color: #aaccff;
            text-shadow: 0 0 8px #2266aa;
            font-size: clamp(0.7rem, 3vw, 0.85rem);
            word-break: break-word;
        }

        /* ДОПОЛНИТЕЛЬНО ДЛЯ МАЛЕНЬКИХ ЭКРАНОВ */
        @media (max-width: 600px) {
            body {
                padding: 1rem;
            }
            .subjects-grid {
                gap: 1rem;
            }
            .subject-card {
                padding: 1.2rem 0.8rem;
            }
            .planet {
                font-size: clamp(1.5rem, 6vw, 2.5rem);
            }
        }
    </style>
</head>
<body>

    <!-- ПЛАНЕТЫ И РАКЕТА -->
    <div class="planet earth">🌍</div>
    <div class="planet moon">🌙</div>
    <div class="planet mars">🪐</div>
    <div class="rocket">🚀</div>

    <script>
        for (let i = 0; i < 180; i++) {
            let star = document.createElement('div');
            star.classList.add('star');
            let size = Math.random() * 3 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 8 + 's';
            star.style.animationDuration = 3 + Math.random() * 5 + 's';
            document.body.appendChild(star);
        }
    </script>

    <div class="container">
        <h1>✨ PREP FOR FINALS ✨</h1>
        <div class="sub">🌙 неоновая подготовка к экзаменам</div>

        <div class="subjects-grid">
            <!-- РЕЛИГИОВЕДЕНИЕ -->
            <div class="subject-card">
                <div class="subject-title">📖 Религиоведение</div>
                <div>блоки 1–50, 51–100 и далее</div>
                <a href="relig_1_50.html" class="btn-start">🚀 Блок 1-50</a>
                <div style="margin-top: 0.6rem; font-size: 0.75rem; color: #bbddff;">скоро больше блоков</div>
            </div>

            <!-- ГОСПИТАЛЬНАЯ ПЕДАГОГИКА -->
            <div class="subject-card">
                <div class="subject-title">🏥 Госпитальная педагогика</div>
                <div>готовится</div>
                <button class="btn-start disabled-btn" disabled>🚧 Скоро</button>
            </div>

            <!-- НЕМЕЦКИЙ -->
            <div class="subject-card">
                <div class="subject-title">🇩🇪 Немецкий</div>
                <div>готовится</div>
                <button class="btn-start disabled-btn" disabled>🚧 Скоро</button>
            </div>

            <!-- ФРАНЦУЗСКИЙ -->
            <div class="subject-card">
                <div class="subject-title">🇫🇷 Французский</div>
                <div>готовится</div>
                <button class="btn-start disabled-btn" disabled>🚧 Скоро</button>
            </div>
        </div>
        <footer>⚡︎ учись ярко, сдавай на отлично ⚡︎</footer>
    </div>
</body>
</html>
